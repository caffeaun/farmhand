name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Copy UI to embed dir
        run: |
          mkdir -p internal/embed/ui_dist
          cp -r ui/dist/. internal/embed/ui_dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }}" \
            -o farmhand-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/farmhand

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: farmhand-${{ matrix.os }}-${{ matrix.arch }}
          path: farmhand-${{ matrix.os }}-${{ matrix.arch }}

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/farmhand-*
